# Render Blueprint —— 在 Render 里 New → Blueprint，连上本仓库即可一键创建。
# 会自动建好：Web 服务 + 免费 Postgres + 注入 DATABASE_URL + 生成 JWT_SECRET。
# 你只需在 Dashboard 手动填 3 个密钥（标了 sync:false 的）：LLM_API_KEY、SMTP_URL、MAIL_FROM。

services:
  - type: web
    name: moon-promptcard-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: LLM_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: LLM_TEXT_MODEL
        value: qwen-plus
      - key: LLM_VISION_MODEL
        value: qwen-vl-plus
      - key: FREE_QUOTA
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: moon-promptcard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_API_KEY
        sync: false
      - key: SMTP_URL
        sync: false
      - key: MAIL_FROM
        sync: false

databases:
  - name: moon-promptcard-db
    plan: free
